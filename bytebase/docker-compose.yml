version: '3.8'

services:
  bytebase:
    image: bytebase/bytebase:latest
    container_name: bytebase
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - bytebase_data:/var/opt/bytebase
    environment:
      - BYTEBASE_PORT=8080
    depends_on:
      bytebase-meta-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # MySQL instance simulating production database (matches prod: 5.7.28)
  mysql-prod:
    image: mysql:5.7.28
    container_name: mysql-prod
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: liquibase_user
      MYSQL_PASSWORD: secure_password
    volumes:
      - mysql_prod_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # MySQL instance simulating preprod database (matches preprod: 5.5.37)
  # NOTE: MySQL 5.5 is NOT supported by Liquibase or Bytebase.
  # Migrations on this instance use direct SQL execution via mysql2 driver.
  mysql-preprod:
    image: mysql:5.5
    container_name: mysql-preprod
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: liquibase_user
      MYSQL_PASSWORD: secure_password
    volumes:
      - mysql_preprod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # MySQL instance for Bytebase internal metadata
  bytebase-meta-db:
    image: mysql:8.0
    container_name: bytebase-meta-db
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: metapass
      MYSQL_DATABASE: bytebase_meta
    volumes:
      - bytebase_meta_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmetapass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  bytebase_data:
  mysql_prod_data:
  mysql_preprod_data:
  bytebase_meta_data:
